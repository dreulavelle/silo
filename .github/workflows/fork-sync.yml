# Nightly upstream drift watch.
#
# Upstream ships Docker images rather than git tags, so there is no release
# train to follow. We pin an explicit commit (fork/upstream.pin) and this job
# tells us, every day, whether advancing that pin is still cheap.
#
# Catching a breaking upstream change within ~24h keeps the blast radius to a
# handful of commits. Discovering six months of drift at once is what kills
# long-lived forks.
name: fork-sync

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily
  workflow_dispatch:
    inputs:
      mode:
        description: "check (drift only) or rebase (trial rebase + build + test)"
        required: false
        default: rebase
        type: choice
        options: [check, rebase]

concurrency:
  group: fork-sync
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # rebase needs real history

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/Silo-Server/silo-server || \
            git remote set-url upstream https://github.com/Silo-Server/silo-server
          git config user.name "fork-sync[bot]"
          git config user.email "fork-sync@users.noreply.github.com"

      # Required by internal/imageutil (cgo → libvips). Mirrors the Dockerfile.
      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libvips-dev

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run fork-sync
        id: sync
        run: |
          set +e
          MODE="${{ inputs.mode || 'rebase' }}"
          ./scripts/fork-sync.sh "$MODE" 2>&1 | tee /tmp/fork-sync-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Summarize
        if: always()
        run: |
          {
            echo '## fork-sync'
            echo
            echo '```'
            # Strip ANSI colour so the job summary stays readable.
            sed -e 's/\x1b\[[0-9;]*m//g' /tmp/fork-sync-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open or update drift issue
        if: steps.sync.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/fork-sync-output.txt', 'utf8')
              // eslint-disable-next-line no-control-regex
              .replace(/\x1b\[[0-9;]*m/g, '');
            const title = 'fork-sync: upstream drift needs attention';
            const body = [
              'The nightly upstream drift check needs a human.',
              '',
              'This means one of: upstream touched a file this fork edits, the trial',
              'rebase conflicted, or the suite failed after rebasing. Resolve it while',
              'the delta is still small.',
              '',
              '```',
              raw.trim(),
              '```',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Locally: `./scripts/fork-sync.sh rebase`',
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'fork-sync',
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['fork-sync'],
              });
            }

      - name: Close drift issue when clean
        if: steps.sync.outputs.exit_code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'fork-sync',
            });
            for (const issue of existing.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: 'Upstream drift resolved — fork-sync is clean again. Closing.',
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

      - name: Fail the run on unresolved drift
        if: steps.sync.outputs.exit_code == '2'
        run: exit 1
